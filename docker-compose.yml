services:
  # 1. Production OLTP Database (Postgres)
  postgres-oltp:
    image: postgres:13
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: olist_production
    ports:
      - "5433:5432"
    volumes:
      - ./raw_data:/raw_data  # Map local CSVs for initial loading

  # 2. Analytics Data Warehouse (Postgres simulating Redshift)
  postgres-dw:
    image: postgres:13
    environment:
      POSTGRES_USER: dw_admin
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: analytics_warehouse
    ports:
      - "5434:5432"

  # 3. MinIO (Simulating Amazon S3)
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console/UI Port
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  # 4. Airflow Setup
  postgres-airflow:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  airflow:
    image: apache/airflow:2.7.1-python3.10
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      # Connections for our databases
      - AIRFLOW_CONN_OLTP_DB=postgresql://admin:admin_password@postgres-oltp:5432/olist_production
      - AIRFLOW_CONN_DW_DB=postgresql://dw_admin:dw_password@postgres-dw:5432/analytics_warehouse
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install -r /requirements.txt && 
      airflow db migrate && 
      airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email admin@example.com || true && 
      airflow standalone"
  
  # 5. Metabase Setup
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_bi
    ports:
      - "3000:3000"